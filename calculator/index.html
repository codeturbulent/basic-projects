<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Calculator</h1>
    <div class="calculator">
      <div class="screen">
        <input type="text" disabled class="smbox box" id="smscr" value="" />
        <input type="text" disabled class="mbox box" value="" maxlength="14" id="lrscr" />
      </div>
      <input type="button" value="C" class="btn btn1" onclick="clearScreen()" />
      <input type="button" value="/" class="btn btn2" onclick="appendValue('/')" />
      <input type="button" value="*" class="btn btn3" onclick="appendValue('*')" />
      <input type="button" value="-" class="btn btn4" onclick="appendValue('-')" />
      <input type="button" value="1" class="btn btn5" onclick="appendValue('1')" />
      <input type="button" value="2" class="btn btn6" onclick="appendValue('2')" />
      <input type="button" value="3" class="btn btn7" onclick="appendValue('3')" />
      <input type="button" value="+" class="btn btn8" onclick="appendValue('+')" />
      <input type="button" value="4" class="btn btn9" onclick="appendValue('4')" />
      <input type="button" value="5" class="btn btn10" onclick="appendValue('5')" />
      <input type="button" value="6" class="btn btn11" onclick="appendValue('6')" />
      <input type="button" value="7" class="btn btn12" onclick="appendValue('7')" />
      <input type="button" value="8" class="btn btn13" onclick="appendValue('8')" />
      <input type="button" value="9" class="btn btn14" onclick="appendValue('9')" />
      <input type="button" value="=" class="btn btn15" onclick="calculate()" />
      <input type="button" value="." class="btn btn16" onclick="appendValue('.')" />
      <input type="button" value="0" class="btn btn17" onclick="appendValue('0')" />
    </div>
  </body>
</html>
