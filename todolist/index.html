<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="shortcut icon" href="icon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>To Do List</h1>
    <div class="b">
      <div class="inputtd">
        <form id="todoForm" class="tdform">
          <textarea
            placeholder="Description..."
            id="textar"
            class="input"
            rows="4"
            required
          ></textarea>
          <input
            type="text"
            required
            class="input"
            id="text"
            placeholder="Title..."
          />
          <div class="buttons">
            <button class="button submit" type="submit">Add to list</button>
            <button class="button reset" type="reset">Reset</button>
          </div>
          <p class="stats">
            <span id="doneCount">0</span> Tasks Done
          </p>
        </form>
      </div>
    </div>
    <div class="screen">
      <table class="table">
        <thead>
          <tr>
            <th width="70px">Sr.No</th>
            <th width="500px">Title</th>
            <th width="120px">Time</th>
            <th class="tdbtn" width="110px" onclick="removeAll()">Remove All</th>
            <th class="tdbtn" width="100px" onclick="checkAll()">Check All</th>
          </tr>
        </thead>
        <tbody id="todoTableBody"></tbody>
      </table>
    </div>
    <script src="index.js"></script>
  </body>
</html>
